theme = '_menus_ttms'
languageCode = 'en-tt'

# Mount theme's content (dashboard, locations, api, etc.); keep project content (defining mounts replaces default for that target)
[module]
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "themes/_menus_ttms/content"
    target = "content"
title = "Monty's Legacy"
baseURL = 'https://montyslegacy.ttmenus.com/'

[markup]

[markup.goldmark]

[markup.goldmark.parser]
      attribute = true

[markup.goldmark.renderer]
      unsafe = true

[outputFormats]

[outputFormats.menuitemsJSON]
    mediaType = "application/json"
    baseName = "menu-items"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "JSON"]
  section = ["HTML", "JSON"]
  page = ["HTML", "JSON"]

[params]
  authServiceUrl = "https://auth.ttmenus.com"
  adsServiceUrl = "https://ads.ttmenus.com"
  notifyServiceUrl = "https://notify.ttmenus.com"

[params.ads]
    clientId = "ttms_montyslegacy"
    enabled = true
    apiUrl = "https://ads.ttmenus.com/api/v1"

[params.auth]
    enabled = true
    apiUrl = "https://auth.ttmenus.com/api/v1"

[params.contentManagement]
    enabled = true
    apiUrl = "https://cms.ttmenus.com/api"
    serviceUrl = "https://cms.ttmenus.com"
    clientId = "ttms_montyslegacy"

# Update UI dashboard (theme reads [params.content] for editor URLs)
[params.content]
    apiUrl = "https://cms.ttmenus.com/api"
    clientId = "ttms_montyslegacy"

# Menu Image Service - user-submitted images with admin approval
[params.menuImageService]
    enabled = true
    apiUrl = "https://menu-images.ttmenus.com/api/v1"

[params.notifications]
    enabled = true
    apiUrl = "https://notify.ttmenus.com/api/v1"
    websocketUrl = "wss://notify.ttmenus.com/api/v1/ws/connect"
    serviceUrl = "https://notify.ttmenus.com"

[params.features]
    payments = false
    delivery = false
    notifications = true

[params.orderingsystem]
    enabled = false
    orderingDisabledMessage = "Ordering is not available for this menu at this time."
    vat = 0
    servicecharge = 0
    hastables = true
    usephonecall = false
    whatsapp = 18682566689
    phone = 18682566689

[params.orderingmenu]
  sidesname = "Sides"

[params.services]
    onesignalid = ""
    analyticsid = 0
    notifications = true

[params.social]
    youtube = ""
    email = "montys.legacy.1997@gmail.com"
    phone = 18682566689
    facebook = ""
    instagram = ""
    tiktok = ""

[privacy]

[privacy.instagram]
    simple = false
    disable = false

[taxonomies]
  ingredient = "ingredients"
  cookingmethod = "cookingmethods"
  tag = "tags"
  category = "categories"
  subcategory = "subcategories"
  type = "types"
  event = "events"
